<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Google Drive 嵌入網址轉換器</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e11;
    --surface: #16161a;
    --surface2: #1e1e24;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.14);
    --accent: #7c6aff;
    --accent-dim: rgba(124,106,255,0.12);
    --accent-glow: rgba(124,106,255,0.25);
    --success: #34d39a;
    --success-dim: rgba(52,211,154,0.1);
    --warn: #f59e0b;
    --warn-dim: rgba(245,158,11,0.1);
    --danger: #f87171;
    --text: #e8e8f0;
    --text-muted: #6e6e80;
    --text-dim: #3a3a48;
    --mono: 'DM Mono', monospace;
    --sans: 'Sora', sans-serif;
    --radius: 10px;
    --radius-lg: 16px;
  }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 48px 24px;
  }

  .page {
    max-width: 720px;
    margin: 0 auto;
  }

  header {
    margin-bottom: 40px;
  }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .logo-icon {
    width: 32px;
    height: 32px;
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-icon svg { width: 16px; height: 16px; }

  h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.3px;
    color: var(--text);
  }

  .subtitle {
    font-size: 14px;
    color: var(--text-muted);
    font-weight: 300;
    line-height: 1.6;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 24px;
    margin-bottom: 16px;
    transition: border-color 0.2s;
  }

  .card:hover { border-color: var(--border-hover); }

  .section-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 12px;
  }

  .input-wrap {
    display: flex;
    gap: 10px;
    align-items: stretch;
  }

  input[type="text"] {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    min-width: 0;
  }

  input[type="text"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  input[type="text"]::placeholder { color: var(--text-dim); }

  .btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 12px 20px;
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    white-space: nowrap;
  }

  .btn:hover { opacity: 0.88; }
  .btn:active { transform: scale(0.97); }

  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: var(--radius);
    padding: 6px 14px;
    font-family: var(--sans);
    font-size: 12px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
  }

  .btn-ghost:hover {
    border-color: var(--border-hover);
    color: var(--text);
    background: var(--surface2);
  }

  .btn-ghost.copied {
    border-color: var(--success);
    color: var(--success);
  }

  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 20px;
  }

  .chip {
    font-size: 12px;
    font-family: var(--sans);
    padding: 4px 12px;
    border-radius: 99px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .chip:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-dim);
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 99px;
    margin-bottom: 16px;
  }

  .badge-type {
    background: var(--accent-dim);
    color: var(--accent);
    border: 1px solid rgba(124,106,255,0.3);
  }

  .result-block {
    margin-bottom: 16px;
  }

  .result-block .label {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 6px;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .url-row {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
  }

  .url-text {
    flex: 1;
    font-family: var(--mono);
    font-size: 12px;
    color: #a78bfa;
    word-break: break-all;
    line-height: 1.5;
    min-width: 0;
  }

  .code-block {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text);
    line-height: 1.7;
    white-space: pre;
    overflow-x: auto;
    margin-bottom: 8px;
  }

  .code-block .attr { color: #7dd3fc; }
  .code-block .val  { color: #86efac; }
  .code-block .tag  { color: #f9a8d4; }

  .notice {
    border-radius: var(--radius);
    padding: 10px 14px;
    font-size: 12px;
    line-height: 1.6;
    display: flex;
    gap: 8px;
    align-items: flex-start;
  }

  .notice-warn {
    background: var(--warn-dim);
    border: 1px solid rgba(245,158,11,0.2);
    color: var(--warn);
  }

  .notice-success {
    background: var(--success-dim);
    border: 1px solid rgba(52,211,154,0.2);
    color: var(--success);
  }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 20px 0;
  }

  .preview-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .preview-frame-wrap {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: auto;
    background: #fff;
  }

  #output { display: none; }
  #error-msg { display: none; }

  .error-box {
    background: rgba(248,113,113,0.08);
    border: 1px solid rgba(248,113,113,0.2);
    border-radius: var(--radius);
    padding: 12px 16px;
    font-size: 13px;
    color: var(--danger);
  }

  @media (max-width: 520px) {
    .input-wrap { flex-direction: column; }
    .btn { width: 100%; }
  }
</style>
</head>
<body>
<div class="page">

  <header>
    <div class="logo-row">
      <div class="logo-icon">
        <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M2 4h12M2 8h8M2 12h10" stroke="#7c6aff" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <h1>Drive 嵌入轉換器</h1>
    </div>
    <p class="subtitle">將 Google Drive / Docs / Sheets / Slides / Forms 的分享連結<br>轉換成可嵌入任何網頁的 iframe 代碼</p>
  </header>

  <div class="card">
    <div class="section-label">快速填入範例</div>
    <div class="chips">
      <span class="chip" onclick="fillExample('file')">Drive 檔案</span>
      <span class="chip" onclick="fillExample('folder')">Drive 資料夾</span>
      <span class="chip" onclick="fillExample('docs')">Google Docs</span>
      <span class="chip" onclick="fillExample('sheets')">Google Sheets</span>
      <span class="chip" onclick="fillExample('slides')">Google Slides</span>
      <span class="chip" onclick="fillExample('forms')">Google Forms</span>
    </div>
    <div class="section-label">貼上分享連結</div>
    <div class="input-wrap">
      <input type="text" id="url-input" placeholder="https://drive.google.com/file/d/...">
      <button class="btn" onclick="convert()">轉換</button>
    </div>
  </div>

  <div id="error-msg">
    <div class="error-box" id="error-text"></div>
  </div>

  <div id="output">
    <div class="card">
      <span class="badge badge-type" id="type-badge"></span>

      <div class="result-block">
        <div class="label">嵌入網址</div>
        <div class="url-row">
          <span class="url-text" id="embed-url"></span>
          <button class="btn-ghost" id="copy-url-btn" onclick="copyText('url')">複製</button>
        </div>
      </div>

      <div class="result-block">
        <div class="label">iframe 嵌入代碼</div>
        <div class="code-block" id="iframe-display"></div>
        <button class="btn-ghost" id="copy-iframe-btn" onclick="copyText('iframe')">複製代碼</button>
      </div>

      <div class="notice notice-warn" id="notice-box">
        <span>⚠</span>
        <span id="notice-text"></span>
      </div>

      <hr class="divider">

      <div class="preview-header">
        <div class="section-label" style="margin:0">即時預覽</div>
        <span style="font-size:12px; color:var(--text-muted)">若空白請確認共用權限已開放</span>
      </div>
      <div class="preview-frame-wrap">
        <iframe id="preview-frame" frameborder="0" allow="autoplay" style="display:block; width:100%;"></iframe>
      </div>
    </div>
  </div>

</div>

<script>
const EXAMPLES = {
  file:    'https://drive.google.com/file/d/1aBcDeFgHiJkLmNoPqRsTuVwXyZ12345678/view?usp=sharing',
  folder:  'https://drive.google.com/drive/folders/1aBcDeFgHiJkLmNoPqRsTuVwXyZ12345678?usp=sharing',
  docs:    'https://docs.google.com/document/d/1aBcDeFgHiJkLmNoPqRsTuVwXyZ12345678/edit?usp=sharing',
  sheets:  'https://docs.google.com/spreadsheets/d/1aBcDeFgHiJkLmNoPqRsTuVwXyZ12345678/edit?usp=sharing',
  slides:  'https://docs.google.com/presentation/d/1aBcDeFgHiJkLmNoPqRsTuVwXyZ12345678/edit?usp=sharing',
  forms:   'https://docs.google.com/forms/d/1aBcDeFgHiJkLmNoPqRsTuVwXyZ12345678/viewform',
};

const TYPE_LABELS = {
  file: 'Drive 檔案', folder: 'Drive 資料夾',
  docs: 'Google Docs', sheets: 'Google Sheets',
  slides: 'Google Slides', forms: 'Google Forms',
};

const NOTICES = {
  file:   '請確認此檔案的共用權限已設為「知道連結的人」可以查看',
  folder: '請確認資料夾的共用權限已設為「知道連結的人」可以查看',
  docs:   '建議先至「檔案 → 共用 → 發布到網路」以獲得最佳嵌入效果',
  sheets: '建議先至「檔案 → 共用 → 發布到網路」以獲得最佳嵌入效果',
  slides: '建議先至「檔案 → 共用 → 發布到網路」以取得含自動播放選項的嵌入碼',
  forms:  '表單預設可公開嵌入，無需額外設定',
};

const SIZES = {
  file: [640, 480], folder: [640, 400],
  docs: [640, 500], sheets: [800, 500],
  slides: [760, 460], forms: [640, 800],
};

function fillExample(key) {
  document.getElementById('url-input').value = EXAMPLES[key];
  convert();
}

function extractId(url) {
  for (const p of [/\/d\/([a-zA-Z0-9_-]{15,})/, /\/folders\/([a-zA-Z0-9_-]{15,})/, /id=([a-zA-Z0-9_-]{15,})/]) {
    const m = url.match(p);
    if (m) return m[1];
  }
  return null;
}

function detectType(url) {
  if (/drive\.google\.com\/file/.test(url))              return 'file';
  if (/drive\.google\.com\/(drive\/)?folders/.test(url)) return 'folder';
  if (/docs\.google\.com\/document/.test(url))           return 'docs';
  if (/docs\.google\.com\/spreadsheets/.test(url))       return 'sheets';
  if (/docs\.google\.com\/presentation/.test(url))       return 'slides';
  if (/docs\.google\.com\/forms/.test(url))              return 'forms';
  if (/drive\.google\.com\/open/.test(url))              return 'file';
  return null;
}

function buildEmbedUrl(type, id) {
  switch(type) {
    case 'file':    return `https://drive.google.com/file/d/${id}/preview`;
    case 'folder':  return `https://drive.google.com/embeddedfolderview?id=${id}#list`;
    case 'docs':    return `https://docs.google.com/document/d/${id}/preview`;
    case 'sheets':  return `https://docs.google.com/spreadsheets/d/${id}/htmlview`;
    case 'slides':  return `https://docs.google.com/presentation/d/${id}/embed?start=false&loop=false`;
    case 'forms':   return `https://docs.google.com/forms/d/${id}/viewform?embedded=true`;
  }
}

function buildIframeCode(embedUrl, type) {
  const [w, h] = SIZES[type];
  const extra = type === 'slides' ? '\n  allowfullscreen="true"' : '';
  return `<iframe\n  src="${embedUrl}"\n  width="${w}" height="${h}"\n  frameborder="0"${extra}>\n</iframe>`;
}

function buildIframeDisplay(embedUrl, type) {
  const [w, h] = SIZES[type];
  const extra = type === 'slides' ? '\n  <span class="attr">allowfullscreen</span>="<span class="val">true</span>"' : '';
  return `<span class="tag">&lt;iframe</span>\n  <span class="attr">src</span>="<span class="val">${embedUrl}</span>"\n  <span class="attr">width</span>="<span class="val">${w}</span>" <span class="attr">height</span>="<span class="val">${h}</span>"\n  <span class="attr">frameborder</span>="<span class="val">0</span>"${extra}>\n<span class="tag">&lt;/iframe&gt;</span>`;
}

let currentEmbedUrl = '';
let currentIframeCode = '';

function convert() {
  const raw = document.getElementById('url-input').value.trim();
  const errEl = document.getElementById('error-msg');
  const outEl = document.getElementById('output');

  errEl.style.display = 'none';
  outEl.style.display = 'none';

  if (!raw) return;

  const type = detectType(raw);
  const id = extractId(raw);

  if (!type || !id) {
    document.getElementById('error-text').textContent = '無法識別此網址格式。請確認貼上的是 Google Drive、Docs、Sheets、Slides 或 Forms 的完整網址。';
    errEl.style.display = 'block';
    return;
  }

  currentEmbedUrl = buildEmbedUrl(type, id);
  currentIframeCode = buildIframeCode(currentEmbedUrl, type);

  document.getElementById('type-badge').textContent = TYPE_LABELS[type];
  document.getElementById('embed-url').textContent = currentEmbedUrl;
  document.getElementById('iframe-display').innerHTML = buildIframeDisplay(currentEmbedUrl, type);
  document.getElementById('notice-text').textContent = NOTICES[type];

  const frame = document.getElementById('preview-frame');
  const [w, h] = SIZES[type];
  frame.style.height = h + 'px';
  frame.src = currentEmbedUrl;

  outEl.style.display = 'block';
}

function copyText(target) {
  const text = target === 'url' ? currentEmbedUrl : currentIframeCode;
  const btnId = target === 'url' ? 'copy-url-btn' : 'copy-iframe-btn';
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById(btnId);
    const orig = btn.textContent;
    btn.textContent = '已複製 ✓';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 2000);
  });
}

document.getElementById('url-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') convert();
});
</script>
</body>
</html>
